name: Warm Provider Caches

on:
  schedule:
    # Every Sunday at 03:00 UTC (weekly)
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      only:
        description: 'Comma-separated provider filter (es,gs,kk,rama,loonex) — leave empty for all'
        required: false
        default: ''

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run warm-all-cache
        run: |
          if [ -n "${{ github.event.inputs.only }}" ]; then
            node warm-all-cache.js --only=${{ github.event.inputs.only }}
          else
            node warm-all-cache.js
          fi

      - name: Commit & push updated cache files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add es-cache/ es-titles-index.json \
                  gs-cache/ gs-titles-index.json \
                  kk-cache/ kk-titles-index.json \
                  rama-cache/ rama-titles-index.json \
                  loonex-cache/ loonex-titles-index.json
          if git diff --cached --quiet; then
            echo "No cache changes detected, skipping commit."
          else
            git commit -m "chore: auto-refresh .gz provider caches [skip ci]"
            git push
          fi
