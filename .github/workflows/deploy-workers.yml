name: Deploy CF Workers

on:
  push:
    paths:
      - 'workers/cfworker.js'
    branches:
      - master
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip commits made by this workflow to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[auto-domain]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy to all CF Worker accounts
        env:
          CF_ACCOUNTS_JSON: ${{ secrets.CF_WORKER_ACCOUNTS }}
        run: |
          node -e "
            const { execSync } = require('child_process');
            const fs = require('fs');
            const accounts = JSON.parse(process.env.CF_ACCOUNTS_JSON);

            let success = 0, failed = 0;
            for (const acc of accounts) {
              // Write wrangler.toml per account
              const toml = [
                'name = \"kisskh-proxy\"',
                'main = \"workers/cfworker.js\"',
                'compatibility_date = \"2024-09-23\"',
                'compatibility_flags = [\"nodejs_compat\"]',
                '',
                '[placement]',
                'mode = \"smart\"',
                '',
                '[ai]',
                'binding = \"AI\"',
                '',
                '[vars]',
                'AUTH_TOKEN = \"' + acc.auth + '\"',
                acc.githubToken ? 'GITHUB_TOKEN = \"' + acc.githubToken + '\"' : '',
                '',
                '[[kv_namespaces]]',
                'binding = \"ES_CACHE\"',
                'id = \"' + acc.kvId + '\"',
                '',
                '[triggers]',
                'crons = [\"0 * * * *\"]',
              ].filter(Boolean).join('\n');
              fs.writeFileSync('wrangler.toml', toml);

              console.log('Deploying to ' + acc.name + '...');
              try {
                execSync('wrangler deploy', {
                  stdio: 'inherit',
                  env: {
                    ...process.env,
                    CLOUDFLARE_API_TOKEN: acc.apiToken,
                    CLOUDFLARE_ACCOUNT_ID: acc.accountId,
                  }
                });
                console.log('✅ ' + acc.name);
                success++;
              } catch (e) {
                console.error('❌ ' + acc.name + ': ' + e.message);
                failed++;
              }
            }

            console.log('\n=== Summary: ' + success + ' OK, ' + failed + ' failed ===');
            if (failed > 0) process.exit(1);
          "
